baseURL: https://gabor-kiss.com/
languageCode: en-us
title: "Gábor — Essays on Software Architecture, Judgment and Change"
theme: ["PaperMod"]

menu:
  main:
    - identifier: essays
      name: Essays
      url: /essays/
      weight: 10
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 20
    - identifier: search
      name: Search
      url: /search/
      weight: 30
    - identifier: about
      name: About
      url: /about/
      weight: 40

params:
  author: "Gábor Kiss"
  ShowReadingTime: false
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: false
  ShowCodeCopyButtons: true
  disableSpecial1stPost: true

  hideHomePagePosts: true

  homeInfoParams:
    enabled: false
  
  assets:
    css:
      - css/custom.css

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 100
    threshold: 0.2 # Lower is stricter, higher is "fuzzier"
    minMatchCharLength: 2
    keys: ["title", "permalink", "summary", "content"]

taxonomies:
  tag: tags

markup:
  goldmark:
    renderer:
      unsafe: true

outputs:
  home:
    - HTML
    - RSS
    - JSON